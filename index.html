<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Starter Quiz — zigbee.com.au</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --dusky: #2C3E6B;
    --dusky-light: #3D5080;
    --dusky-dark: #1A2540;
    --electric: #00AAFF;
    --electric-glow: rgba(0,170,255,0.18);
    --zigbee-red: #E8003D;
    --router-green: #5A8A6A;
    --device-blue: #5A7FA8;
    --white: #F4F7FF;
    --grey: #8A9BC0;
    --card-bg: rgba(44,62,107,0.55);
    --border: rgba(0,170,255,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dusky-dark);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(0,170,255,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 100%, rgba(232,0,61,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(44,62,107,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Animated dots */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,170,255,0.12) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
    animation: driftDots 30s linear infinite;
  }

  @keyframes driftDots {
    0% { transform: translate(0,0); }
    100% { transform: translate(36px, 36px); }
  }

  .quiz-wrapper {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .quiz-header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.7s ease both;
  }

  .quiz-brand {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--electric);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .quiz-brand::before,
  .quiz-brand::after {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--electric);
    opacity: 0.5;
  }

  .quiz-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 14px;
  }

  .quiz-title span {
    color: var(--electric);
  }

  .quiz-subtitle {
    font-size: 16px;
    color: var(--grey);
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Progress */
  .progress-bar-wrap {
    margin-bottom: 36px;
    animation: fadeDown 0.7s 0.1s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--grey);
  }

  .progress-count {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--electric);
  }

  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--electric), #00DDAA);
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 12px rgba(0,170,255,0.5);
  }

  /* Question card */
  .question-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    backdrop-filter: blur(12px);
    animation: slideUp 0.45s cubic-bezier(0.4,0,0.2,1) both;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-number {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--electric);
    margin-bottom: 10px;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 700;
    color: var(--white);
    margin-bottom: 28px;
    line-height: 1.3;
  }

  /* Options grid */
  .options-grid {
    display: grid;
    gap: 12px;
  }

  .options-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .options-grid.cols-1 { grid-template-columns: 1fr; }

  @media (max-width: 520px) {
    .options-grid.cols-2 { grid-template-columns: 1fr; }
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.22s ease;
    text-align: left;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 1.35;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--electric-glow), transparent);
    opacity: 0;
    transition: opacity 0.22s;
  }

  .option-btn:hover {
    border-color: var(--electric);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,170,255,0.15);
  }

  .option-btn:hover::before { opacity: 1; }

  .option-btn.selected {
    border-color: var(--electric);
    background: rgba(0,170,255,0.12);
    box-shadow: 0 0 0 1px var(--electric), 0 6px 24px rgba(0,170,255,0.2);
  }

  .option-btn.selected::before { opacity: 1; }

  .option-emoji {
    font-size: 22px;
    flex-shrink: 0;
    width: 32px;
    text-align: center;
  }

  .option-label { flex: 1; }

  .option-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.22s;
    margin-left: auto;
  }

  .option-btn.selected .option-check {
    background: var(--electric);
    border-color: var(--electric);
  }

  .option-btn.selected .option-check::after {
    content: '✓';
    font-size: 11px;
    color: white;
    font-weight: 700;
  }

  /* Nav buttons */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    gap: 12px;
  }

  .btn-back {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--grey);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
    padding: 10px 0;
  }

  .btn-back:hover { color: var(--white); }
  .btn-back:disabled { opacity: 0; pointer-events: none; }

  .btn-next {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--dusky-dark);
    background: linear-gradient(135deg, var(--electric), #00CCEE);
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    cursor: pointer;
    transition: all 0.22s;
    box-shadow: 0 4px 20px rgba(0,170,255,0.35);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-next:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,170,255,0.45);
  }

  .btn-next:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
  }

  /* Results */
  .result-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    backdrop-filter: blur(12px);
    animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1) both;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,170,255,0.12);
    border: 1px solid rgba(0,170,255,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--electric);
    margin-bottom: 20px;
  }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 8px;
    color: var(--white);
  }

  .result-title span { color: var(--electric); }

  .result-context {
    font-size: 14px;
    color: var(--electric);
    font-weight: 500;
    margin-bottom: 20px;
    padding: 10px 16px;
    background: rgba(0,170,255,0.08);
    border-left: 3px solid var(--electric);
    border-radius: 0 8px 8px 0;
    line-height: 1.5;
  }

  .result-advice {
    font-size: 15px;
    color: rgba(244,247,255,0.88);
    line-height: 1.75;
    margin-bottom: 28px;
  }

  .result-advice strong {
    color: var(--white);
    font-weight: 500;
  }

  /* Recommended products */
  .products-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 14px;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .product-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    text-decoration: none;
    transition: all 0.2s;
  }

  .product-chip:hover {
    border-color: var(--electric);
    background: rgba(0,170,255,0.08);
    transform: translateY(-1px);
  }

  .product-chip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Next steps links */
  .nextsteps-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 14px;
  }

  .nextsteps-grid {
    display: grid;
    gap: 10px;
    margin-bottom: 32px;
  }

  .nextstep-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    text-decoration: none;
    color: var(--white);
    font-size: 14px;
    font-weight: 400;
    transition: all 0.2s;
    line-height: 1.3;
  }

  .nextstep-link:hover {
    border-color: var(--electric);
    background: rgba(0,170,255,0.07);
    transform: translateX(4px);
  }

  .nextstep-section {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--electric);
    display: block;
    margin-bottom: 2px;
  }

  .nextstep-icon {
    font-size: 18px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }

  .nextstep-arrow {
    margin-left: auto;
    color: var(--electric);
    opacity: 0.5;
    font-size: 16px;
    flex-shrink: 0;
  }

  /* Restart */
  .btn-restart {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--grey);
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-align: center;
  }

  .btn-restart:hover {
    border-color: var(--grey);
    color: var(--white);
  }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 24px 0;
  }

  /* Footer note */
  .quiz-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: var(--grey);
    opacity: 0.7;
    animation: fadeDown 0.7s 0.3s ease both;
  }

  .quiz-footer a { color: var(--electric); text-decoration: none; }

  @media (max-width: 600px) {
    .question-card, .result-card { padding: 24px 20px; }
    .quiz-wrapper { padding: 24px 14px 48px; }
  }
</style>
</head>

// --- RENDER ---
function renderQuestion(idx) {
  const q = questions[idx];
  const pct = (idx / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `Question ${idx+1} of ${questions.length}`;

  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="question-card">
      <div class="question-number">Question ${idx+1} of ${questions.length}</div>
      <div class="question-text">${q.text}</div>
      <div class="options-grid cols-${q.cols}" id="optionsGrid">
        ${q.options.map(opt => `
          <button class="option-btn${answers[q.id] === opt.value ? ' selected' : ''}" data-value="${opt.value}" onclick="selectOption('${q.id}','${opt.value}')">
            <span class="option-emoji">${opt.emoji}</span>
            <span class="option-label">${opt.label}</span>
            <span class="option-check"></span>
          </button>
        `).join('')}
      </div>
      <div class="nav-row">
        <button class="btn-back" onclick="goBack()" ${idx === 0 ? 'disabled' : ''}>← Back</button>
        <button class="btn-next" id="btnNext" onclick="goNext()" ${answers[q.id] ? '' : 'disabled'}>
          ${idx === questions.length - 1 ? 'See My Results →' : 'Next →'}
        </button>
      </div>
    </div>
  `;
}

function selectOption(qid, value) {
  answers[qid] = value;
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.value === value);
  });
  document.getElementById('btnNext').disabled = false;
}

function goNext() {
  if (current < questions.length - 1) {
    current++;
    renderQuestion(current);
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) { current--; renderQuestion(current); }
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressCount').textContent = 'Your Results';
  document.getElementById('progressWrap').querySelector('.progress-label').textContent = 'Complete!';

  const goal = answers.goal;
  const tech = answers.tech;
  const result = advice[goal][tech];
  const contextNote = getContextNote(answers);

  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="result-card">
      <div class="result-badge">${result.emoji} Your Smart Home Profile</div>
      <h2 class="result-title">You're a <span>${result.title}</span></h2>
      ${contextNote ? `<div class="result-context">💡 ${contextNote}</div>` : ''}
      <p class="result-advice">${result.body}</p>

      <div class="divider"></div>

      <div class="products-title">Recommended Devices to Start With</div>
      <div class="products-grid">
        ${result.products.map(p => `
          <a class="product-chip" href="${p.url}" target="_blank" rel="noopener">
            <span class="product-chip-dot" style="background:${p.color}"></span>
            ${p.name}
          </a>
        `).join('')}
      </div>

      <div class="divider"></div>

      <div class="nextsteps-title">Your Next Steps on zigbee.com.au</div>
      <div class="nextsteps-grid">
        ${result.links.map(l => `
          <a class="nextstep-link" href="${l.url}" target="_blank" rel="noopener">
            <span class="nextstep-icon">${l.icon}</span>
            <span>
              <span class="nextstep-section">${l.section}</span>
              ${l.text}
            </span>
            <span class="nextstep-arrow">→</span>
          </a>
        `).join('')}
      </div>

      <div class="divider"></div>
      <button class="btn-restart" onclick="restartQuiz()">↺ Start Over</button>
    </div>
  `;
}

function restartQuiz() {
  Object.keys(answers).forEach(k => delete answers[k]);
  current = 0;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressWrap').querySelector('.progress-label').textContent = 'Your Progress';
  renderQuestion(0);
}

// Init
renderQuestion(0);
</script>
</body>
</html>
